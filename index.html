<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilal AI - Gelişmiş Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #131314; color: #e3e3e3; margin: 0; }
        .sidebar { background-color: #1e1f20; border-right: 1px solid #2b2c2e; transition: all 0.3s; }
        .user-msg { background-color: #2b2c2e; border-radius: 1.2rem; padding: 1rem; margin-left: auto; max-width: 85%; border: 1px solid #3c4043; color: white; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 10px; }
        pre { background: #000; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 10px 0; border: 1px solid #333; font-family: 'Courier New', Courier, monospace; }
        code { color: #6fbef3; }
        .animate-fade { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-72 flex flex-col p-4 hidden md:flex shrink-0">
        <button onclick="window.location.reload()" class="flex items-center gap-3 bg-[#2b2c2e] hover:bg-[#3c4043] transition p-3 rounded-xl mb-8 border border-gray-700">
            <i data-lucide="plus" class="w-5 h-5 text-blue-400"></i>
            <span class="font-medium text-sm text-white">Yeni Sohbet</span>
        </button>
        
        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <p class="text-xs font-semibold text-gray-500 mb-4 px-2 uppercase tracking-widest text-[10px]">Geçmiş Sohbetler</p>
            <div id="chat-list" class="space-y-1"></div>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-800">
            <div id="api-status-box" class="p-3 rounded-lg bg-red-900/10 border border-red-900/30 mb-2 text-center">
                <p class="text-[10px] text-red-400 mb-2" id="status-text">● API Bağlantısı Yok</p>
                <button onclick="setApiKey()" class="text-[11px] bg-white text-black px-3 py-1.5 rounded-md font-bold w-full hover:bg-gray-200 transition">API ANAHTARI GİR</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[#131314]">
        <header class="p-4 flex justify-between items-center border-b border-gray-800/50 bg-[#131314]">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold text-white tracking-tight">Bilal <span class="text-blue-500">AI</span></h1>
                <select id="model-select" class="bg-[#1e1f20] border border-gray-700 text-gray-300 text-xs rounded-full px-4 py-1.5 outline-none cursor-pointer focus:ring-1 focus:ring-blue-600">
                    <option value="gemini-1.5-flash">Standart (Hızlı)</option>
                    <option value="gemini-1.5-pro">Pro (Gelişmiş)</option>
                </select>
            </div>
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center font-bold text-xs">B</div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-6 custom-scrollbar">
            <div id="welcome-text" class="h-full flex flex-col items-center justify-center opacity-60">
                <div class="w-16 h-16 bg-[#1e1f20] border border-gray-800 rounded-2xl flex items-center justify-center mb-4">
                    <i data-lucide="sparkles" class="w-8 h-8 text-blue-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Bilal AI'ya Hoş Geldin</h2>
                <p class="text-sm text-gray-400 mt-2">Daha akıllı yanıtlar için Pro modelini deneyebilirsin.</p>
            </div>
        </div>

        <div class="p-4 bg-gradient-to-t from-[#131314] to-transparent">
            <div class="max-w-4xl mx-auto relative">
                <div class="bg-[#1e1f20] rounded-2xl border border-gray-800 p-2 shadow-2xl flex items-end gap-2 focus-within:border-gray-600 transition">
                    <textarea id="user-input" rows="1" placeholder="Bilal AI'ya bir şeyler sor..." class="flex-1 bg-transparent p-3 focus:outline-none resize-none max-h-48 text-sm text-white" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'"></textarea>
                    <button onclick="handleSend()" class="p-3 bg-blue-600 text-white hover:bg-blue-500 rounded-xl transition shadow-lg shrink-0">
                        <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="text-[10px] text-center text-gray-600 mt-2 tracking-wide font-medium">GOOGLE GEMINI 1.5 ALTYAPISI</p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let API_KEY = "";
        let isWaiting = false;

        function setApiKey() {
            const key = prompt("Google AI Studio'dan aldığınız API Anahtarını (AIza...) buraya yapıştırın:");
            if (key && key.trim().length > 10) {
                API_KEY = key.trim();
                document.getElementById('status-text').innerText = "● API AKTİF";
                document.getElementById('status-text').className = "text-[10px] text-green-400 mb-2";
                document.getElementById('api-status-box').className = "p-3 rounded-lg bg-green-900/10 border border-green-900/30 mb-2";
                alert("Başarılı! Bilal AI kullanıma hazır.");
            }
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const model = document.getElementById('model-select').value;
            const text = input.value.trim();

            if (!text || isWaiting) return;
            if (!API_KEY) { setApiKey(); return; }

            if (document.getElementById('welcome-text')) document.getElementById('welcome-text').remove();
            
            isWaiting = true;
            input.value = "";
            input.style.height = 'auto';

            chatWindow.innerHTML += `
                <div class="flex flex-col items-end animate-fade">
                    <div class="user-msg text-sm font-light leading-relaxed">${text}</div>
                </div>`;
            
            if (chatWindow.querySelectorAll('.user-msg').length === 1) addToSidebar(text);

            const aiId = "ai-" + Date.now();
            chatWindow.innerHTML += `
                <div class="flex gap-4 animate-fade" id="${aiId}">
                    <div class="w-8 h-8 rounded-full bg-blue-600/20 flex items-center justify-center shrink-0 border border-blue-500/20">
                        <i data-lucide="bot" class="w-4 h-4 text-blue-400"></i>
                    </div>
                    <div class="flex-1 text-sm leading-relaxed pt-1 text-gray-200" id="text-${aiId}">
                        <span class="text-gray-500 animate-pulse font-medium italic text-xs">Bilal AI düşünüyor...</span>
                    </div>
                </div>`;
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
            lucide.createIcons();

            try {
                // Dinamik Versiyon Seçimi: Flash -> v1, Pro -> v1beta
                const version = model.includes('pro') ? 'v1beta' : 'v1';
                const url = `https://generativelanguage.googleapis.com/${version}/models/${model}:generateContent?key=${API_KEY}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const aiText = data.candidates[0].content.parts[0].text;
                document.getElementById(`text-${aiId}`).innerHTML = formatOutput(aiText);

            } catch (error) {
                document.getElementById(`text-${aiId}`).innerHTML = `<span class="text-red-500">Hata: ${error.message}</span><br><small class="text-gray-600 italic">Diğer modeli (Standart/Pro) seçerek tekrar deneyebilirsiniz.</small>`;
            } finally {
                isWaiting = false;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function formatOutput(text) {
            // Güvenlik ve Markdown Formatı
            return text
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function addToSidebar(title) {
            const list = document.getElementById('chat-list');
            const item = document.createElement('div');
            item.className = "p-3 hover:bg-[#2b2c2e] rounded-xl cursor-pointer text-xs text-gray-400 transition truncate border border-transparent flex items-center gap-2";
            item.innerHTML = `<i data-lucide="message-square" class="w-3 h-3 text-gray-600"></i> ${title.substring(0, 30)}`;
            list.prepend(item);
            lucide.createIcons();
        }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
