<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilal AI - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #131314; color: #e3e3e3; }
        .sidebar { background-color: #1e1f20; }
        .chat-area { max-width: 850px; margin: 0 auto; }
        .user-msg { background-color: #2b2c2e; border-radius: 1.2rem; padding: 1rem; margin-left: auto; width: fit-content; max-width: 85%; }
        .ai-msg { margin-right: auto; width: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 10px; }
        pre { background: #000; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 10px 0; }
        code { font-family: 'Courier New', monospace; color: #6fbef3; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-72 flex flex-col p-4 hidden md:flex border-r border-gray-800">
        <button onclick="window.location.reload()" class="flex items-center gap-3 bg-[#2b2c2e] hover:bg-[#3c4043] transition p-3 rounded-xl mb-8">
            <i data-lucide="plus" class="w-5 h-5"></i>
            <span class="font-medium text-sm">Yeni Sohbet</span>
        </button>
        
        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <p class="text-xs font-semibold text-gray-500 mb-4 px-2 uppercase tracking-widest">Sohbetler</p>
            <div id="chat-list" class="space-y-1">
                </div>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-800">
            <button onclick="setApiKey()" class="flex items-center gap-3 w-full p-3 hover:bg-[#2b2c2e] rounded-lg transition text-gray-400">
                <i data-lucide="key" class="w-4 h-4"></i>
                <span class="text-xs">API Anahtarını Değiştir</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="p-4 flex justify-between items-center bg-[#131314]/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-bold tracking-tight text-white">Bilal <span class="text-blue-500">AI</span></h1>
                <select id="model-select" class="bg-[#1e1f20] border border-gray-700 text-gray-300 text-xs rounded-full px-3 py-1 focus:ring-1 focus:ring-blue-500 outline-none">
                    <option value="gemini-1.5-flash">Standart Model (Hızlı)</option>
                    <option value="gemini-1.5-pro">Pro Model (Zeki)</option>
                </select>
            </div>
            <div id="api-status" class="text-[10px] px-2 py-1 rounded bg-red-900/30 text-red-400 border border-red-800/50">API Bekleniyor</div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-8 custom-scrollbar">
            <div id="welcome-text" class="h-full flex flex-col items-center justify-center opacity-50">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-4 rotate-3">
                    <i data-lucide="bot" class="w-10 h-10 text-white"></i>
                </div>
                <h2 class="text-2xl font-semibold">Bilal AI'ya hoş geldin</h2>
                <p class="text-sm mt-2 text-gray-400 text-center max-w-xs">Gelişmiş yapay zeka ile kod yazın, çeviri yapın veya merak ettiklerinizi sorun.</p>
            </div>
        </div>

        <div class="p-4 bg-gradient-to-t from-[#131314] via-[#131314] to-transparent">
            <div class="chat-area relative">
                <div class="flex items-end gap-2 bg-[#1e1f20] rounded-2xl p-2 border border-gray-800 focus-within:border-gray-600 transition shadow-2xl">
                    <textarea id="user-input" rows="1" placeholder="Bilal AI'ya sorun..." class="w-full bg-transparent p-3 focus:outline-none resize-none max-h-60 custom-scrollbar text-sm" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'"></textarea>
                    <button onclick="handleSend()" id="send-btn" class="p-3 bg-white text-black hover:bg-blue-500 hover:text-white rounded-xl transition-all duration-300 flex-shrink-0">
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="text-[10px] text-center text-gray-600 mt-3">Bilal AI gelişmiş Gemini 1.5 altyapısını kullanır.</p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let API_KEY = "";
        let isWaiting = false;

        function setApiKey() {
            const key = prompt("Lütfen Google AI Studio (Gemini) API Anahtarınızı girin:");
            if (key) {
                API_KEY = key;
                document.getElementById('api-status').innerText = "API Aktif";
                document.getElementById('api-status').className = "text-[10px] px-2 py-1 rounded bg-green-900/30 text-green-400 border border-green-800/50";
                alert("API Başarıyla Bağlandı!");
            }
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const model = document.getElementById('model-select').value;
            const text = input.value.trim();

            if (!text || isWaiting) return;
            if (!API_KEY) {
                setApiKey();
                return;
            }

            // Arayüz Hazırlığı
            if (document.getElementById('welcome-text')) document.getElementById('welcome-text').remove();
            isWaiting = true;
            input.value = "";
            input.style.height = 'auto';

            // Kullanıcı Mesajı
            chatWindow.innerHTML += `
                <div class="chat-area flex flex-col items-end animate-fade">
                    <div class="user-msg text-sm font-light leading-relaxed">${text}</div>
                </div>`;
            
            // Sohbet Listesine Ekle (İlk mesajsa)
            if (chatWindow.children.length <= 2) {
                addToSidebar(text);
            }

            // AI Yanıt Kutusu (Boş)
            const aiRespId = "ai-" + Date.now();
            chatWindow.innerHTML += `
                <div class="chat-area flex gap-5 ai-msg animate-pulse" id="${aiRespId}">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-600 to-purple-700 flex items-center justify-center shrink-0">
                        <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
                    </div>
                    <div class="flex-1 text-sm leading-relaxed prose prose-invert pt-1">
                        <p class="text-gray-500 italic">Düşünüyor...</p>
                    </div>
                </div>`;
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
            lucide.createIcons();

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                const aiResult = data.candidates[0].content.parts[0].text;
                
                // Yanıtı Yazdır
                const container = document.getElementById(aiRespId);
                container.classList.remove('animate-pulse');
                container.querySelector('.flex-1').innerHTML = formatText(aiResult);

            } catch (error) {
                document.getElementById(aiRespId).querySelector('.flex-1').innerHTML = "<span class='text-red-500'>Hata: API anahtarı geçersiz veya bağlantı sorunu var.</span>";
            } finally {
                isWaiting = false;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function formatText(text) {
            // Basit Markdown ve Kod Blokları Dönüştürücü
            let formatted = text
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            return formatted;
        }

        function addToSidebar(title) {
            const list = document.getElementById('chat-list');
            const item = document.createElement('div');
            item.className = "flex items-center gap-3 p-3 hover:bg-[#2b2c2e] rounded-xl cursor-pointer text-sm text-gray-400 transition truncate";
            item.innerHTML = `<i data-lucide="message-circle" class="w-4 h-4 shrink-0"></i> ${title}`;
            list.prepend(item);
            lucide.createIcons();
        }

        // Enter tuşu ile gönderme
        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
