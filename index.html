<script>
        lucide.createIcons();
        let API_KEY = "";
        let isWaiting = false;

        function setApiKey() {
            const key = prompt("Google AI Studio'dan aldığınız API Anahtarını (AIza...) buraya yapıştırın:");
            if (key && key.trim().length > 10) {
                API_KEY = key.trim();
                document.getElementById('status-text').innerText = "● API Aktif";
                document.getElementById('status-text').className = "text-[10px] text-green-400 mb-2";
                document.getElementById('api-status-box').className = "p-3 rounded-lg bg-green-900/10 border border-green-900/30 mb-2";
            }
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const model = document.getElementById('model-select').value;
            const text = input.value.trim();

            if (!text || isWaiting) return;
            if (!API_KEY) { setApiKey(); return; }

            if (document.getElementById('welcome-text')) document.getElementById('welcome-text').remove();
            
            isWaiting = true;
            input.value = "";
            input.style.height = 'auto';

            // Kullanıcı Mesajı
            chatWindow.innerHTML += `
                <div class="flex flex-col items-end animate-fade">
                    <div class="user-msg text-sm font-light leading-relaxed">${text}</div>
                </div>`;
            
            if (chatWindow.querySelectorAll('.user-msg').length === 1) addToSidebar(text);

            const aiId = "ai-" + Date.now();
            chatWindow.innerHTML += `
                <div class="flex gap-4 ai-msg animate-fade" id="${aiId}">
                    <div class="w-8 h-8 rounded-full bg-blue-600/20 border border-blue-600/30 flex items-center justify-center shrink-0">
                        <i data-lucide="sparkles" class="w-4 h-4 text-blue-400"></i>
                    </div>
                    <div class="flex-1 text-sm leading-relaxed pt-1 markdown-content">
                        <span class="text-gray-500 animate-pulse">Bilal AI yanıtlıyor...</span>
                    </div>
                </div>`;
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
            lucide.createIcons();

            try {
                // v1beta sürümü hem Flash hem Pro modelini destekler
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    // Eğer 404 hatası dönerse alternatif URL dene (Bazı bölgeler için)
                    throw new Error(data.error.message);
                }

                const aiText = data.candidates[0].content.parts[0].text;
                document.getElementById(aiId).querySelector('.markdown-content').innerHTML = formatOutput(aiText);

            } catch (error) {
                document.getElementById(aiId).querySelector('.markdown-content').innerHTML = 
                `<span class='text-red-500'>Hata: ${error.message}</span><br>
                <small class="text-gray-600">İpucu: Eğer Pro model hata veriyorsa Standart modeli seçip deneyin.</small>`;
            } finally {
                isWaiting = false;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function formatOutput(text) {
            return text
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") // Güvenlik
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function addToSidebar(title) {
            const list = document.getElementById('chat-list');
            const item = document.createElement('div');
            item.className = "flex items-center gap-3 p-3 hover:bg-[#2b2c2e] rounded-xl cursor-pointer text-sm transition truncate border border-transparent hover:border-gray-700";
            item.innerHTML = `<i data-lucide="message-square" class="w-4 h-4 shrink-0 text-blue-500"></i> ${title.substring(0, 30)}...`;
            list.prepend(item);
            lucide.createIcons();
        }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
