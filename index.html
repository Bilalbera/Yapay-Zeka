<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilal AI - Final Sürüm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #131314; color: #e3e3e3; margin: 0; }
        .sidebar { background-color: #1e1f20; border-right: 1px solid #2b2c2e; }
        .user-msg { background-color: #2b2c2e; border-radius: 1.2rem; padding: 1rem; margin-left: auto; max-width: 85%; border: 1px solid #3c4043; color: white; }
        pre { background: #000; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 10px 0; border: 1px solid #333; font-family: monospace; }
        code { color: #6fbef3; }
        .animate-fade { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-72 flex flex-col p-4 hidden md:flex shrink-0">
        <button onclick="window.location.reload()" class="flex items-center gap-3 bg-[#2b2c2e] hover:bg-[#3c4043] transition p-3 rounded-xl mb-8 border border-gray-700">
            <i data-lucide="plus" class="w-5 h-5 text-blue-400"></i>
            <span class="font-medium text-sm text-white">Yeni Sohbet</span>
        </button>
        <div class="flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-gray-500 mb-4 px-2 uppercase tracking-widest text-[10px]">Sohbetler</p>
            <div id="chat-list" class="space-y-1"></div>
        </div>
        <div class="mt-auto pt-4 border-t border-gray-800">
            <div id="api-status-box" class="p-3 rounded-lg bg-red-900/10 border border-red-900/30 mb-2 text-center">
                <p class="text-[10px] text-red-400 mb-2" id="status-text">● API Bağlı Değil</p>
                <button onclick="setApiKey()" class="text-[11px] bg-white text-black px-3 py-1.5 rounded-md font-bold w-full hover:bg-gray-200 transition">ANAHTARI GİR</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[#131314]">
        <header class="p-4 flex justify-between items-center border-b border-gray-800/50">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold text-white">Bilal <span class="text-blue-500">AI</span></h1>
                <select id="model-select" class="bg-[#1e1f20] border border-gray-700 text-gray-300 text-xs rounded-full px-4 py-1.5 outline-none">
                    <option value="gemini-1.5-flash-latest">Standart (Flash 1.5)</option>
                    <option value="gemini-1.5-pro-latest">Pro (Gelişmiş 1.5)</option>
                </select>
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-6">
            <div id="welcome-text" class="h-full flex flex-col items-center justify-center opacity-60">
                <i data-lucide="sparkles" class="w-12 h-12 text-blue-500 mb-4"></i>
                <h2 class="text-2xl font-bold text-white text-center">Merhaba Bilal!<br>Sana nasıl yardımcı olabilirim?</h2>
            </div>
        </div>

        <div class="p-4">
            <div class="max-w-4xl mx-auto relative">
                <div class="bg-[#1e1f20] rounded-2xl border border-gray-800 p-2 shadow-2xl flex items-end gap-2">
                    <textarea id="user-input" rows="1" placeholder="Mesajınızı yazın..." class="flex-1 bg-transparent p-3 focus:outline-none resize-none text-sm text-white" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'"></textarea>
                    <button onclick="handleSend()" class="p-3 bg-blue-600 text-white hover:bg-blue-500 rounded-xl transition shrink-0">
                        <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let API_KEY = "";
        let isWaiting = false;

        function setApiKey() {
            const key = prompt("API Anahtarınızı yapıştırın:");
            if (key) {
                API_KEY = key.trim();
                document.getElementById('status-text').innerText = "● API AKTİF";
                document.getElementById('status-text').className = "text-[10px] text-green-400 mb-2";
                document.getElementById('api-status-box').className = "p-3 rounded-lg bg-green-900/10 border border-green-900/30 mb-2";
            }
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const model = document.getElementById('model-select').value;
            const text = input.value.trim();

            if (!text || isWaiting) return;
            if (!API_KEY) { setApiKey(); return; }

            if (document.getElementById('welcome-text')) document.getElementById('welcome-text').remove();
            isWaiting = true;
            input.value = "";
            input.style.height = 'auto';

            chatWindow.innerHTML += `<div class="flex flex-col items-end animate-fade"><div class="user-msg text-sm">${text}</div></div>`;
            
            const aiId = "ai-" + Date.now();
            chatWindow.innerHTML += `
                <div class="flex gap-4 animate-fade" id="${aiId}">
                    <div class="w-8 h-8 rounded-full bg-blue-600/20 flex items-center justify-center shrink-0 border border-blue-500/20">
                        <i data-lucide="bot" class="w-4 h-4 text-blue-400"></i>
                    </div>
                    <div class="flex-1 text-sm leading-relaxed pt-1 text-gray-200" id="text-${aiId}">
                        <span class="text-gray-500 animate-pulse italic">Cevap hazırlanıyor...</span>
                    </div>
                </div>`;
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
            lucide.createIcons();

            try {
                // 404 Hatasını Çözen Yeni Link Yapısı (v1beta kullanıyoruz çünkü en güncel modeller orada)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const aiText = data.candidates[0].content.parts[0].text;
                document.getElementById(`text-${aiId}`).innerHTML = formatOutput(aiText);

            } catch (error) {
                document.getElementById(`text-${aiId}`).innerHTML = `<span class="text-red-500">Hata: ${error.message}</span>`;
            } finally {
                isWaiting = false;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function formatOutput(text) {
            return text
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });
    </script>
</body>
</html>
