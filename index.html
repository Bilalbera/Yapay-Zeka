<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #131314; color: #e3e3e3; }
        .sidebar { background-color: #1e1f20; }
        .chat-container { max-width: 800px; margin: 0 auto; }
        .user-msg { background-color: #374151; border-radius: 18px; padding: 10px 16px; margin-left: auto; max-width: 80%; }
        .ai-msg { margin-right: auto; max-width: 90%; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-64 flex flex-col p-4 hidden md:flex">
        <button onclick="newChat()" class="flex items-center gap-3 bg-[#282a2c] hover:bg-[#374151] transition p-3 rounded-full mb-8">
            <i data-lucide="plus"></i>
            <span class="font-medium">Yeni Sohbet</span>
        </button>
        
        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <p class="text-xs font-semibold text-gray-500 mb-4 px-2 uppercase tracking-wider">Sohbetler</p>
            <div id="chat-list" class="space-y-2">
                </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="p-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl font-semibold">Bilal AI</span>
                <select id="model-select" class="bg-transparent border border-gray-600 rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                    <option value="standart" class="bg-[#1e1f20]">Standart (Hızlı)</option>
                    <option value="pro" class="bg-[#1e1f20]">Pro (Zeki)</option>
                </select>
            </div>
            <div class="w-8 h-8 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-full flex items-center justify-center font-bold">B</div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-6 custom-scrollbar">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center">
                <h1 class="text-4xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-red-400 bg-clip-text text-transparent">Size nasıl yardımcı olabilirim?</h1>
                <p class="text-gray-400">Bilal AI ile kod yazabilir, soru sorabilir veya beyin fırtınası yapabilirsiniz.</p>
            </div>
        </div>

        <div class="p-4 bg-[#131314]">
            <div class="chat-container relative">
                <textarea id="user-input" rows="1" placeholder="Buraya yazın..." class="w-full bg-[#1e1f20] border-none rounded-2xl p-4 pr-12 focus:outline-none focus:ring-1 focus:ring-blue-500 resize-none overflow-hidden" oninput="autoResize(this)"></textarea>
                <button onclick="sendMessage()" class="absolute right-3 bottom-3 p-2 bg-blue-600 hover:bg-blue-700 rounded-xl transition">
                    <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                </button>
            </div>
            <p class="text-center text-[10px] text-gray-500 mt-2">Bilal AI hata yapabilir. Önemli bilgileri kontrol edin.</p>
        </div>
    </main>

    <script>
        // İkonları başlat
        lucide.createIcons();

        let chats = [];
        let currentChatId = null;

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function newChat() {
            const chatWindow = document.getElementById('chat-window');
            chatWindow.innerHTML = `
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center">
                    <h1 class="text-4xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-red-400 bg-clip-text text-transparent">Size nasıl yardımcı olabilirim?</h1>
                </div>`;
            currentChatId = Date.now();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const model = document.getElementById('model-select').value;
            const message = input.value.trim();

            if (!message) return;

            // Karşılama ekranını kaldır
            if(document.getElementById('welcome-screen')) {
                document.getElementById('welcome-screen').remove();
                addChatToSidebar(message);
            }

            // Kullanıcı mesajını ekle
            chatWindow.innerHTML += `
                <div class="flex flex-col items-end w-full">
                    <div class="user-msg text-sm">${message}</div>
                </div>`;

            input.value = '';
            input.style.height = 'auto';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // AI Yanıtı (Simülasyon)
            setTimeout(() => {
                const response = getAIResponse(message, model);
                chatWindow.innerHTML += `
                    <div class="ai-msg flex gap-4 p-2">
                        <div class="w-8 h-8 rounded-full bg-blue-900 flex items-center justify-center shrink-0">
                            <i data-lucide="bot" class="w-5 h-5 text-blue-300"></i>
                        </div>
                        <div class="pt-1 text-sm leading-relaxed">
                            <p class="font-bold mb-1">${model.toUpperCase()} MODEL</p>
                            ${response}
                        </div>
                    </div>`;
                lucide.createIcons();
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 800);
        }

        function getAIResponse(input, model) {
            if (model === "pro") {
                return "Pro Model Analizi: '" + input + "' konusunu derinlemesine inceledim. Karmaşık mantık kullanarak size en optimize çözümü sunuyorum. Bu model, Standart modele göre %40 daha fazla veriye erişir.";
            } else {
                return "Hızlı Yanıt: '" + input + "' sorunuza standart işlemciyle anında cevap veriyorum!";
            }
        }

        function addChatToSidebar(title) {
            const list = document.getElementById('chat-list');
            const chatBtn = document.createElement('div');
            chatBtn.className = "flex items-center gap-3 p-2 hover:bg-[#282a2c] rounded-lg cursor-pointer text-sm truncate";
            chatBtn.innerHTML = `<i data-lucide="message-square" class="w-4 h-4"></i> ${title.substring(0, 20)}...`;
            list.prepend(chatBtn);
            lucide.createIcons();
        }
    </script>
</body>
</html>
