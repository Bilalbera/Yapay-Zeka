<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilal AI - Gelişmiş Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #131314; color: #e3e3e3; }
        .sidebar { background-color: #1e1f20; border-right: 1px solid #2b2c2e; }
        .user-msg { background-color: #2b2c2e; border-radius: 1.2rem; padding: 1rem; margin-left: auto; max-width: 85%; border: 1px solid #3c4043; }
        .ai-msg { margin-right: auto; width: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 10px; }
        pre { background: #000; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 10px 0; border: 1px solid #333; }
        code { font-family: 'Courier New', monospace; color: #6fbef3; }
        .animate-fade { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-72 flex flex-col p-4 hidden md:flex">
        <button onclick="window.location.reload()" class="flex items-center gap-3 bg-[#2b2c2e] hover:bg-[#3c4043] transition p-3 rounded-xl mb-8 border border-gray-700">
            <i data-lucide="plus" class="w-5 h-5"></i>
            <span class="font-medium text-sm">Yeni Sohbet</span>
        </button>
        
        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <p class="text-xs font-semibold text-gray-500 mb-4 px-2 uppercase tracking-widest text-[10px]">Sohbet Geçmişi</p>
            <div id="chat-list" class="space-y-1 text-gray-400">
                </div>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-800">
            <div id="api-status-box" class="p-3 rounded-lg bg-red-900/10 border border-red-900/30 mb-2">
                <p class="text-[10px] text-red-400 mb-2" id="status-text">● API Anahtarı Gerekli</p>
                <button onclick="setApiKey()" class="text-[11px] bg-white text-black px-3 py-1.5 rounded-md font-bold w-full hover:bg-gray-200 transition">ANAHTARI GİR</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[#131314]">
        <header class="p-4 flex justify-between items-center border-b border-gray-800/50 bg-[#131314]/90 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold bg-gradient-to-r from-white to-gray-500 bg-clip-text text-transparent">Bilal AI</h1>
                <select id="model-select" class="bg-[#1e1f20] border border-gray-700 text-gray-300 text-xs rounded-full px-4 py-1.5 focus:ring-2 focus:ring-blue-600 outline-none cursor-pointer">
                    <option value="gemini-1.5-flash">Standart (Hızlı)</option>
                    <option value="gemini-1.5-pro">Pro (Gelişmiş)</option>
                </select>
            </div>
            <div class="w-9 h-9 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-full flex items-center justify-center font-bold shadow-lg shadow-blue-900/20">B</div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-8 custom-scrollbar">
            <div id="welcome-text" class="h-full flex flex-col items-center justify-center">
                <div class="w-20 h-20 bg-[#1e1f20] border border-gray-800 rounded-3xl flex items-center justify-center mb-6 shadow-2xl">
                    <i data-lucide="bot" class="w-10 h-10 text-blue-500"></i>
                </div>
                <h2 class="text-3xl font-bold mb-2">Merhaba Bilal!</h2>
                <p class="text-gray-500 text-sm">Sana bugün ne konuda yardımcı olabilirim?</p>
            </div>
        </div>

        <div class="p-4">
            <div class="max-w-3xl mx-auto relative">
                <div class="bg-[#1e1f20] rounded-2xl border border-gray-800 p-2 shadow-2xl focus-within:border-blue-900 transition-colors">
                    <textarea id="user-input" rows="1" placeholder="Buraya yazın..." class="w-full bg-transparent p-3 focus:outline-none resize-none max-h-64 custom-scrollbar text-sm" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'"></textarea>
                    <div class="flex justify-between items-center px-2 pb-1">
                        <span class="text-[10px] text-gray-600">Gemini 1.5 Altyapısı</span>
                        <button onclick="handleSend()" id="send-btn" class="p-2 bg-blue-600 text-white hover:bg-blue-500 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                            <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let API_KEY = "";
        let isWaiting = false;

        function setApiKey() {
            const key = prompt("Google AI Studio'dan aldığınız API Anahtarını (AIza...) buraya yapıştırın:");
            if (key && key.trim().length > 10) {
                API_KEY = key.trim();
                document.getElementById('status-text').innerText = "● API Aktif";
                document.getElementById('status-text').className = "text-[10px] text-green-400 mb-2";
                document.getElementById('api-status-box').className = "p-3 rounded-lg bg-green-900/10 border border-green-900/30 mb-2";
            } else {
                alert("Geçersiz anahtar!");
            }
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const model = document.getElementById('model-select').value;
            const text = input.value.trim();

            if (!text || isWaiting) return;
            if (!API_KEY) {
                setApiKey();
                return;
            }

            if (document.getElementById('welcome-text')) document.getElementById('welcome-text').remove();
            
            isWaiting = true;
            input.value = "";
            input.style.height = 'auto';

            // Kullanıcı Mesajı
            chatWindow.innerHTML += `
                <div class="flex flex-col items-end animate-fade">
                    <div class="user-msg text-sm font-light leading-relaxed">${text}</div>
                </div>`;
            
            if (chatWindow.querySelectorAll('.user-msg').length === 1) addToSidebar(text);

            // AI Yanıt Kutusu
            const aiId = "ai-" + Date.now();
            chatWindow.innerHTML += `
                <div class="flex gap-4 ai-msg animate-fade" id="${aiId}">
                    <div class="w-8 h-8 rounded-full bg-blue-600/20 border border-blue-600/30 flex items-center justify-center shrink-0">
                        <i data-lucide="sparkles" class="w-4 h-4 text-blue-400"></i>
                    </div>
                    <div class="flex-1 text-sm leading-relaxed pt-1 markdown-content">
                        <span class="text-gray-500 animate-pulse">Düşünüyor...</span>
                    </div>
                </div>`;
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
            lucide.createIcons();

            try {
                // 404 hatasını önlemek için EN GÜNCEL URL yapısı (v1)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiText = data.candidates[0].content.parts[0].text;
                document.getElementById(aiId).querySelector('.markdown-content').innerHTML = formatOutput(aiText);

            } catch (error) {
                document.getElementById(aiId).querySelector('.markdown-content').innerHTML = `<span class='text-red-500'>Hata: ${error.message}</span>`;
            } finally {
                isWaiting = false;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function formatOutput(text) {
            return text
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function addToSidebar(title) {
            const list = document.getElementById('chat-list');
            const item = document.createElement('div');
            item.className = "flex items-center gap-3 p-3 hover:bg-[#2b2c2e] rounded-xl cursor-pointer text-sm transition truncate border border-transparent hover:border-gray-700";
            item.innerHTML = `<i data-lucide="message-square" class="w-4 h-4 shrink-0"></i> ${title.substring(0, 30)}...`;
            list.prepend(item);
            lucide.createIcons();
        }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
